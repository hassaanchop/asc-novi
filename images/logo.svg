<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" fill="none" role="img" aria-label="Bone and Joint Surgery Center of Novi">

  <!-- Bone icon -->
  <g transform="translate(2, 10)">
    <!-- shaft -->
    <rect x="14" y="13" width="4" height="6" rx="1" fill="#0F6E56"/>
    <!-- top-left knuckle -->
    <circle cx="11" cy="11" r="5.5" fill="#0F6E56"/>
    <!-- top-right knuckle -->
    <circle cx="21" cy="11" r="5.5" fill="#0F6E56"/>
    <!-- bottom-left knuckle -->
    <circle cx="11" cy="21" r="5.5" fill="#0F6E56"/>
    <!-- bottom-right knuckle -->
    <circle cx="21" cy="21" r="5.5" fill="#0F6E56"/>
    <!-- shaft fill to connect -->
    <rect x="9.5" y="11" width="13" height="10" fill="#0F6E56"/>
  </g>

  <!-- Wordmark -->
  <!-- "Bone & Joint" -->
  <text x="36" y="24"
    font-family="'Playfair Display', Georgia, serif"
    font-size="17"
    font-weight="700"
    fill="#0F6E56"
    letter-spacing="0.01em">Bone &amp; Joint</text>

  <!-- "Surgery Center of Novi" -->
  <text x="36" y="40"
    font-family="'Inter', system-ui, sans-serif"
    font-size="10"
    font-weight="500"
    fill="#5a6272"
    letter-spacing="0.04em">SURGERY CENTER OF NOVI</text>

</svg>
